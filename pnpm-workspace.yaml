# pnpm 11 blocks dependency build scripts by default and aborts CI installs
# with ERR_PNPM_IGNORED_BUILDS until each is explicitly approved here. These
# deps legitimately need their install/build scripts (native builds:
# sharp/bcrypt/esbuild/unrs-resolver; postinstall: core-js/protobufjs/msw/etc).
# Dependency overrides. pnpm 11 reads overrides from here (the package.json
# `pnpm.overrides` block is not applied under this setup). Used to pin
# transitive deps to patched versions for security advisories Dependabot
# can't fix directly (e.g. dompurify is pulled in transitively via posthog-js).
overrides:
  '@types/react': '19.2.15'
  '@types/react-dom': '19.2.3'
  'axios@<1.15.2': '>=1.15.2'
  'basic-ftp@<=5.3.0': '>=5.3.1'
  'brace-expansion@<1.1.13': '>=1.1.13'
  'brace-expansion@>=2.0.0 <2.0.3': '>=2.0.3'
  'brace-expansion@>=5.0.0 <5.0.6': '>=5.0.6'
  '@isaacs/brace-expansion@<=5.0.0': '>=5.0.1'
  'dompurify@<=3.4.10': '>=3.4.11'
  'fast-uri@<=3.1.1': '>=3.1.2'
  'fast-xml-builder@<=1.1.6': '>=1.1.7'
  'flatted@<=3.4.1': '>=3.4.2'
  'follow-redirects@<=1.15.11': '>=1.16.0'
  'ip-address@<=10.1.0': '>=10.1.1'
  'lodash@<=4.17.23': '>=4.18.0'
  'lodash-es@<=4.17.23': '>=4.18.0'
  'minimatch@<3.1.4': '>=3.1.4'
  'minimatch@>=9.0.0 <9.0.7': '>=9.0.7'
  'minimatch@>=10.0.0 <10.2.3': '>=10.2.3'
  'nth-check@<2.0.1': '>=2.0.1'
  'path-to-regexp@<0.1.13': '>=0.1.13'
  'picomatch@>=4.0.0 <4.0.4': '>=4.0.4'
  'postcss@<8.5.10': '>=8.5.10'
  'qs@<6.14.2': '>=6.14.2'
  'tmp@<=0.2.3': '>=0.2.4'
  'uuid@<11.1.1': '>=11.1.1'
  'validator@<13.15.22': '>=13.15.22'
  'ws@>=8.0.0 <8.20.1': '>=8.20.1'
  # NOTE: undici is intentionally NOT overridden. Its only sub-6 instance
  # (5.29.0) comes via @vercel/blob (a runtime dependency); 5.29.0 already
  # includes the relevant 5.x security patches, and forcing it to 6.x risks
  # breaking blob storage in production.

allowBuilds:
  '@posthog/cli': true
  bcrypt: true
  bufferutil: true
  core-js: true
  esbuild: true
  msw: true
  protobufjs: true
  sharp: true
  unrs-resolver: true
